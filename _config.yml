# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: "OpenDesk"
logo: "/assets/images/cli-logo.png"
email: ""
description: >- # this means to ignore newlines until "baseurl:"
  OpenDesk turns natural-language instructions into desktop workflows
  that can run across apps, files, and remote channels.
baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  uv0xab

# Build settings
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "dirt"
plugins:
  - jekyll-feed

exclude:
  - src
  - public
  - dist
  - node_modules
  - .astro
  - astro.config.mjs
  - package.json
  - pnpm-lock.yaml
  - pnpm-workspace.yaml
  - tsconfig.json

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      sidebar: false

copyright: "© 2026 The OpenDesk Team, All Rights Reserved"

footer:
  links:
    - label: "GitCode"
      icon: "fab fa-fw fa-git-alt"
      url: "https://gitcode.com/openharmony-robot/OpenDesk"
    - label: ""
      icon: "/assets/images/openharmony/logo.png"
      url: "https://gitcode.com/openharmony-robot/OpenDesk"

author:
  name             : "OpenDesk Team"
  avatar           : # path of avatar image, e.g. "/assets/images/bio-photo.jpg"
  bio              : "OpenDesk project documentation."
  location         : ""
  email            :
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
      # url: "mailto:your.name@email.com"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      # url: "https://your-website.com"
    - label: "Twitter"
      icon: "fab fa-fw fa-square-x-twitter"
      # url: "https://twitter.com/"
    - label: "Facebook"
      icon: "fab fa-fw fa-square-facebook"
      # url: "https://facebook.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      # url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      # url: "https://instagram.com/"
